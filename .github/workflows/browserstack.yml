name: BrowserStack Real Devices

on:
  workflow_dispatch:
  schedule:
    # Run once a week on Monday at 07:00 UTC (saves trial/paid minutes vs every push)
    - cron: "0 7 * * 1"

jobs:
  real-devices:
    name: BrowserStack smoke on 5 real devices
    if: vars.BASE_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install core deps (including browserstack-node-sdk)
        run: |
          pnpm install --no-frozen-lockfile
          pnpm add --no-frozen-lockfile browserstack-node-sdk@latest

      - name: Run BrowserStack tests
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          # browserstack.yml uses userName/accessKey fields — inject via env vars
          pnpm exec browserstack-node-sdk playwright test --config=./playwright.bs.config.js

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bs-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore
