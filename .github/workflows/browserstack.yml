name: BrowserStack Real Devices

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  real-devices:
    name: BrowserStack smoke on 5 real devices
    if: vars.BASE_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: pnpm install --no-frozen-lockfile
      - name: Run BrowserStack tests (direct)
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BASE_URL: ${{ vars.BASE_URL }}
        run: pnpm exec playwright test --config=./playwright.bs.config.cjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bs-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore