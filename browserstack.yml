# BrowserStack credentials are injected via env vars BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY
# (set as GitHub Secrets in the repo)

projectName: QA Template
buildName: qa-real-devices
buildIdentifier: "#${BUILD_NUMBER}"

framework: playwright
source: qa-template-bs:v1

# Conservative scope — expand in per-project copy as needed.
# BrowserStack SDK is flaky at large scale (10+ devices), keep to 5-7.
platforms:
  - os: OS X
    osVersion: Sonoma
    browserName: chrome
    browserVersion: latest
  - os: Windows
    osVersion: "11"
    browserName: chrome
    browserVersion: latest
  - deviceName: iPhone 14
    osVersion: "16"
    browserName: playwright-webkit
  - deviceName: iPhone SE 2022
    osVersion: "15"
    browserName: playwright-webkit
  - deviceName: Samsung Galaxy S23
    osVersion: "13.0"
    browserName: chrome

parallelsPerPlatform: 1
browserstackLocal: false
testObservability: false
video: true
networkLogs: false
